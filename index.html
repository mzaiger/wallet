<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Wallet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #ffd700;
    --green: #00ff88;
    --cyan: #00bfff;
    --red: #ff3344;
    --bg: #07071a;
    --panel: #0d0d2a;
    --border: #1e2a5e;
  }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: #cce;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .wallet-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .wallet-header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 16px #ffd70088, 0 0 40px #ffd70044;
    letter-spacing: 4px;
  }
  .wallet-header p {
    font-size: 11px;
    color: #6677aa;
    letter-spacing: 3px;
    margin-top: 4px;
  }

  /* ── BALANCE CARD ── */
  .balance-card {
    background: var(--panel);
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 24px 40px;
    text-align: center;
    box-shadow: 0 0 40px #ffd70022, 0 0 80px #0000cc22;
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
    min-width: 280px;
  }
  .balance-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 18px;
    background: linear-gradient(135deg, #ffd70033 0%, transparent 50%, #ffd70011 100%);
    pointer-events: none;
  }
  .balance-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: #8899bb;
    margin-bottom: 6px;
  }
  .balance-amount {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(40px, 10vw, 64px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px #ffd70099;
    line-height: 1;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .balance-amount.win-flash {
    color: var(--green);
    text-shadow: 0 0 24px #00ff8899;
  }
  .balance-amount.lose-flash {
    color: var(--red);
    text-shadow: 0 0 24px #ff334499;
  }
  .balance-cents {
    font-size: 20px;
    opacity: 0.6;
  }
  .balance-zero {
    display: none;
    font-size: 12px;
    color: var(--red);
    letter-spacing: 2px;
    margin-top: 6px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── CENTER POPUP ── */
  .center-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .center-popup.show { display: flex; }
  .center-popup-inner {
    background: var(--panel);
    border: 3px solid var(--gold);
    border-radius: 18px;
    padding: 28px 48px;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,0,0.35), 0 8px 40px rgba(0,0,0,0.9);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 80vw;
    line-height: 1.5;
  }
  .center-popup.win .center-popup-inner  { border-color: var(--green); color: var(--green); box-shadow: 0 0 60px rgba(0,255,136,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  .center-popup.lose .center-popup-inner { border-color: var(--red);   color: var(--red);   box-shadow: 0 0 60px rgba(255,51,68,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── WALLET ITEMS ── */
  .wallet-items {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 32px;
  }
  .wallet-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 160px;
  }
  .wallet-item-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #556;
  }
  .wallet-item iframe {
    border: none;
    border-radius: 8px;
    background: #111;
    display: block;
  }

  /* ── GAME GRID ── */
  .games-section { width: 100%; max-width: 520px; }
  .games-label {
    font-size: 10px;
    letter-spacing: 4px;
    color: #4455aa;
    margin-bottom: 14px;
    text-align: center;
  }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
  }
  .game-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 18px 12px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: #cce;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .game-btn:hover:not(.disabled) {
    border-color: var(--cyan);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 191, 255, 0.15);
  }
  .game-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .game-btn .icon { font-size: 28px; }
  .game-btn .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--cyan);
    text-align: center;
  }
  .game-btn .cost {
    font-size: 10px;
    color: #556;
    letter-spacing: 1px;
  }
  .game-btn.keno { border-color: #330000; }
  .game-btn.keno:hover:not(.disabled) { border-color: #cc0000; box-shadow: 0 8px 30px rgba(200,0,0,0.2); }
  .game-btn.keno .name { color: #ff5555; }
  .game-btn.tunes { border-color: #001133; }
  .game-btn.tunes:hover:not(.disabled) { border-color: #0077cc; box-shadow: 0 8px 30px rgba(0,119,204,0.2); }
  .game-btn.tunes .name { color: var(--cyan); }
  .game-btn.pulltab { border-color: #221100; }
  .game-btn.pulltab:hover:not(.disabled) { border-color: #cc7700; box-shadow: 0 8px 30px rgba(200,120,0,0.2); }
  .game-btn.pulltab .name { color: var(--gold); }
  .game-btn.arcade { border-color: #002211; }
  .game-btn.arcade:hover:not(.disabled) { border-color: #00aa66; box-shadow: 0 8px 30px rgba(0,170,100,0.2); }
  .game-btn.arcade .name { color: var(--green); }
</style>
</head>
<body>

<!-- CENTER POPUP -->
<div class="center-popup" id="centerPopup">
  <div class="center-popup-inner" id="centerPopupMsg"></div>
</div>

<div class="wallet-header">
  <h1>💳 Bar WALLET</h1>
  <p>YOUR CREDITS · SHARED ACROSS ALL GAMES</p>
</div>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance-label">CURRENT BALANCE</div>
  <div class="balance-amount" id="balanceDisplay">$<span id="balanceAmt">20</span><span class="balance-cents">.00</span></div>
  <div class="balance-zero" id="zeroMsg">⛔ OUT OF CREDITS — ADD FUNDS</div>
</div>

<!-- WALLET ITEMS: ticket + pull tab iframes -->
<div class="wallet-items">
  <div class="wallet-item">
    <div class="wallet-item-label">KENO TICKET</div>
    <iframe src="https://marcitech.is-a.dev/GoRedKeno/GoRedKeno.html?target=ticket" width="340" height="520" scrolling="no" title="Keno Ticket"></iframe>
  </div>
  <div class="wallet-item">
    <div class="wallet-item-label">PULL TAB</div>
    <iframe src="https://marcitech.is-a.dev/PullTabs/PullTabs.html?target=pulltab" width="270" height="520" scrolling="no" title="Pull Tab"></iframe>
  </div>
</div>

<!-- GAME LINKS — hidden when ?menu=off -->
<div class="games-section" id="gamesSection">
  <div class="games-label">PLAY A GAME · $1.00 PER PLAY</div>
  <div class="games-grid" id="gamesGrid">
    <a class="game-btn keno" id="btnKeno" href="../GoRedKeno/index.html" onclick="return launchGame(event, this)">
      <span class="icon">🎱</span>
      <span class="name">GO RED KENO</span>
      <span class="cost">$1 · WIN UP TO $500</span>
    </a>
    <a class="game-btn tunes" id="btnTunes" href="../PressTunes/index.html" onclick="return launchGame(event, this)">
      <span class="icon">🎵</span>
      <span class="name">PRESS TUNES</span>
      <span class="cost">$1 · WIN UP TO $50</span>
    </a>
    <a class="game-btn pulltab" id="btnPull" href="../PullTabs/index.html" onclick="return launchGame(event, this)">
      <span class="icon">🎟️</span>
      <span class="name">PULL TABS</span>
      <span class="cost">$1 · WIN UP TO $200</span>
    </a>
    <a class="game-btn arcade" id="btnArcade" href="../SuperTouch/index.html" onclick="return launchGame(event, this)">
      <span class="icon">🕹️</span>
      <span class="name">SUPER TOUCH</span>
      <span class="cost">$1 PER GAME</span>
    </a>
  </div>
</div>

<script>
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  renderBalance(clamped);
  return clamped;
}

function renderBalance(bal) {
  bal = typeof bal === 'number' ? bal : getBalance();
  document.getElementById('balanceAmt').textContent = bal.toFixed(0);
  const zeroMsg = document.getElementById('zeroMsg');
  zeroMsg.style.display = bal <= 0 ? 'block' : 'none';
  ['btnKeno','btnTunes','btnPull','btnArcade'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) {
      if (bal <= 0) btn.classList.add('disabled');
      else btn.classList.remove('disabled');
    }
  });
}

// ── Center popup ──────────────────────────────────────────────────────────────
let _popTmr;
function popup(msg, type) {
  const el = document.getElementById('centerPopup');
  const msgEl = document.getElementById('centerPopupMsg');
  msgEl.textContent = msg;
  el.className = 'center-popup show ' + (type || '');
  clearTimeout(_popTmr);
  _popTmr = setTimeout(() => el.classList.remove('show'), 3500);
}

function flashBalance(type) {
  const el = document.getElementById('balanceDisplay');
  el.classList.add(type === 'win' ? 'win-flash' : 'lose-flash');
  setTimeout(() => el.classList.remove('win-flash', 'lose-flash'), 1500);
}

// ── URL params: betwin / betlose ──────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('betwin')) {
    const label = params.get('betwin') || 'bet';
    const newBal = setBalance(getBalance() + 10);
    flashBalance('win');
    popup('🎉 You won $10 in the ' + label + ' bet!\nBalance: $' + newBal, 'win');
    history.replaceState({}, '', window.location.pathname);
  } else if (params.has('betlose')) {
    const label = params.get('betlose') || 'bet';
    const newBal = setBalance(getBalance() - 10);
    flashBalance('lose');
    popup('😔 You lost $10 in the ' + label + ' bet.\nBalance: $' + newBal, 'lose');
    history.replaceState({}, '', window.location.pathname);
  }

  // ── ?menu=off → hide the games grid ─────────────────────────────────────────
  if (params.get('menu') === 'off') {
    const sec = document.getElementById('gamesSection');
    if (sec) sec.style.display = 'none';
  }
})();

// ── Win callback from sub-apps ────────────────────────────────────────────────
window.addEventListener('message', function(e) {
  const d = e.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'ARCADE_WIN' && typeof d.amount === 'number' && d.amount > 0) {
    const newBal = setBalance(getBalance() + d.amount);
    flashBalance('win');
    popup('🎉 You won $' + d.amount + '!\nNew balance: $' + newBal, 'win');
  }
  if (d.type === 'ARCADE_LOSE') {
    renderBalance();
  }
});

// ── Launch game: navigate WITHOUT deducting — the game's own index handles $1 ─
// (The individual game index files patch their own iframes and charge on play.)
// From the wallet we just navigate directly so the $1 is only charged once
// (by the game page when you actually press play/start, not on arrival).
function launchGame(evt, btn) {
  evt.preventDefault();
  const bal = getBalance();
  if (bal <= 0) {
    popup('⛔ No credits! Add funds to play.', 'lose');
    return false;
  }
  // Navigate without deducting — game page handles first charge
  window.location.href = btn.href;
  return false;
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderBalance(getBalance());
</script>
</body>
</html>
